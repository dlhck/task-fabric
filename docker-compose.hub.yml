services:
  task-fabric:
    image: dlhck/task-fabric:latest
    ports:
      - "8181:8181"
    environment:
      - TASKS_DIR=/data/tasks
      - API_KEY=${API_KEY}
      - TASKS_REPO_URL=${TASKS_REPO_URL:-}
      - GIT_TOKEN=${GIT_TOKEN:-}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - PORT=8181
      - SERVER_URL=${SERVER_URL:-}
    volumes:
      - task-data:/data/tasks
    restart: unless-stopped

volumes:
  task-data:
